name: Docker Build and Push
on:
    workflow_dispatch:
env:
    IMAGE_NAME: "MY-FLASK-APP"
    TAG: "latest"
jobs:
    build_and_push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
            
            - name: Login to Docker Hub
              uses: docker/login-action@v1
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build and push Docker Image
              uses: docker/build-push-action@v2
              with:
                context: .
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
            
            - name: Logout from Docker Hub
              run: docker logout
            
            - name: Verify Docker Image
              run: |
                docker pull ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
                docker images ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
            - name: Test Docker Image
              run: |
                docker run --rm ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG python app.py
            
            
             